---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://192.168.42.10:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "192.168.42.10"
additionalMachineCertSans: *sans

clusterPodNets: ["10.42.0.0/16"]
clusterSvcNets: ["10.43.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "k8s-0"
    ipAddress: "192.168.42.100"
    installDisk: "/dev/nvme0n1"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/ab86bd395e263b78e5f54c800e4d319dae786d9ae25ecb129462a9e0e9491615
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "38:05:25:37:33:e1"
        dhcp: false
        addresses:
          - "192.168.42.100/24"
        routes:
          - gateway: "192.168.42.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "192.168.42.10"
    patches:
      - "@./patches/k8s-0/tb4-network.yaml"
  - hostname: "k8s-1"
    ipAddress: "192.168.42.101"
    installDisk: "/dev/nvme0n1"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/ab86bd395e263b78e5f54c800e4d319dae786d9ae25ecb129462a9e0e9491615
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "38:05:25:37:37:e5"
        dhcp: false
        addresses:
          - "192.168.42.101/24"
        routes:
          - gateway: "192.168.42.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "192.168.42.10"
    patches:
      - "@./patches/k8s-1/tb4-network.yaml"
  - hostname: "k8s-2"
    ipAddress: "192.168.42.102"
    installDisk: "/dev/nvme0n1"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/ab86bd395e263b78e5f54c800e4d319dae786d9ae25ecb129462a9e0e9491615
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "38:05:25:35:f5:ab"
        dhcp: false
        addresses:
          - "192.168.42.102/24"
        routes:
          - gateway: "192.168.42.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "192.168.42.10"
    patches:
      - "@./patches/k8s-2/tb4-network.yaml"

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-iommu.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/cluster.yaml"

