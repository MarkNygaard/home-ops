---
# Restic repository credentials for Cloudflare R2.
# Values are injected via Flux postBuild substitution from cluster-secrets.
# Before any Volsync-enabled app can deploy, add these variables to
# kubernetes/components/sops/cluster-secrets.sops.yaml:
#
#   VOLSYNC_R2_BUCKET_URL: "https://<account-id>.r2.cloudflarestorage.com/cluster-volsync"
#   VOLSYNC_RESTIC_PASSWORD: "<strong-random-password>"
#   VOLSYNC_R2_ACCESS_KEY_ID: "<r2-api-token-key-id>"
#   VOLSYNC_R2_SECRET_ACCESS_KEY: "<r2-api-token-secret>"
#
# Each app gets its own restic repository path under the bucket (${APP} is
# substituted by the app's ks.yaml postBuild.substitute.APP value).
apiVersion: v1
kind: Secret
metadata:
  name: ${APP}-volsync-secret
stringData:
  RESTIC_REPOSITORY: s3:${VOLSYNC_R2_BUCKET_URL}/${APP}
  RESTIC_PASSWORD: ${VOLSYNC_RESTIC_PASSWORD}
  AWS_ACCESS_KEY_ID: ${VOLSYNC_R2_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${VOLSYNC_R2_SECRET_ACCESS_KEY}
