---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: recyclarr
spec:
  chartRef:
    kind: OCIRepository
    name: recyclarr
  interval: 1h
  values:
    controllers:
      recyclarr:
        annotations:
          reloader.stakater.com/auto: "true"
        type: cronjob
        cronjob:
          schedule: "0 5 * * *"
          successfulJobsHistory: 1
          failedJobsHistory: 1
        containers:
          app:
            image:
              repository: ghcr.io/recyclarr/recyclarr
              tag: 8.5.0@sha256:5da14297a11aa910582d800f0edcb8f9e9d488642083c01dc34950f6449d9214
            command: ["/bin/bash", "-c", "recyclarr state repair --adopt && recyclarr sync"]
            envFrom:
              - secretRef:
                  name: recyclarr-secret
            env:
              TZ: Europe/Copenhagen
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
    persistence:
      config:
        type: emptyDir
        globalMounts:
          - path: /config
      config-file:
        type: configMap
        name: recyclarr
        globalMounts:
          - path: /config/recyclarr.yml
            subPath: recyclarr.yml
            readOnly: true
      tmp:
        type: emptyDir
    configMaps:
      config:
        data:
          recyclarr.yml: |
            sonarr:
              sonarr:
                base_url: http://sonarr.media.svc.cluster.local
                api_key: !env_var SONARR_API_KEY
                delete_old_custom_formats: true
                quality_definition:
                  type: series
                quality_profiles:
                  - name: WEB-1080p
                    trash_id: 72dae194fc92bf828f32cde7744e51a1
                    reset_unmatched_scores:
                      enabled: true
            radarr:
              radarr:
                base_url: http://radarr.media.svc.cluster.local
                api_key: !env_var RADARR_API_KEY
                delete_old_custom_formats: true
                quality_definition:
                  type: movie
                quality_profiles:
                  - name: HD Bluray + WEB
                    trash_id: d1d67249d3890e49bc12e275d989a7e9
                    reset_unmatched_scores:
                      enabled: true
