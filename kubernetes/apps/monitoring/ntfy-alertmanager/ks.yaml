---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ntfy-alertmanager
spec:
  dependsOn:
    - name: ntfy
    - name: kube-prometheus-stack
  interval: 1h
  path: ./kubernetes/apps/monitoring/ntfy-alertmanager/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: monitoring
  wait: false
