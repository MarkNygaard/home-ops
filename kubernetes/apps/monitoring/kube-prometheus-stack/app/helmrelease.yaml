---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  interval: 1h
  valuesFrom:
    - kind: ConfigMap
      name: flux-metrics-configmap
      valuesKey: flux-metrics.yaml
  values:
    cleanPrometheusOperatorObjectNames: true
    alertmanager:
      route:
        main:
          enabled: true
          hostnames:
            - "alertmanager.${SECRET_DOMAIN}"
          parentRefs:
            - name: envoy-internal
              namespace: network
      config:
        global:
          resolve_timeout: 5m
        receivers:
          - name: "null"
          - name: ntfy
            webhook_configs:
              - url: http://ntfy.monitoring.svc.cluster.local/alertmanager
                send_resolved: true
        route:
          group_by: ["alertname", "namespace"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: ntfy
          routes:
            - receiver: "null"
              matchers:
                - alertname = "InfoInhibitor"
            - receiver: "null"
              matchers:
                - alertname = "Watchdog"
      alertmanagerSpec:
        externalUrl: "https://alertmanager.${SECRET_DOMAIN}"
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              resources:
                requests:
                  storage: 1Gi
    kubeEtcd:
      service:
        selector:
          component: kube-apiserver
    kubeProxy:
      enabled: false
    prometheus:
      route:
        main:
          enabled: true
          hostnames:
            - "prometheus.${SECRET_DOMAIN}"
          parentRefs:
            - name: envoy-internal
              namespace: network
      prometheusSpec:
        externalUrl: "https://prometheus.${SECRET_DOMAIN}"
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        retention: 14d
        retentionSize: 15GB
        resources:
          requests:
            cpu: 100m
          limits:
            memory: 2000Mi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              resources:
                requests:
                  storage: 20Gi
    prometheus-node-exporter:
      fullnameOverride: node-exporter
    kube-state-metrics:
      fullnameOverride: kube-state-metrics
    grafana:
      enabled: false
      forceDeployDashboards: true
      operator:
        dashboardsConfigMapRefEnabled: true
        folder: observability
        matchLabels:
          grafana.internal/instance: grafana
    additionalPrometheusRulesMap:
      oom-rules:
        groups:
          - name: oom
            rules:
              - alert: OomKilled
                annotations:
                  summary: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.
                expr: (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
                labels:
                  severity: critical
      temperature-rules:
        groups:
          - name: temperature
            rules:
              - alert: NvmeTemperatureHigh
                annotations:
                  summary: "NVMe temperature is {{ $value }}°C on {{ $labels.instance }}"
                expr: smartctl_device_temperature{temperature_type="current"} > 65
                for: 5m
                labels:
                  severity: warning
              - alert: CpuTemperatureHigh
                annotations:
                  summary: "CPU temperature is {{ $value }}°C on {{ $labels.instance }}"
                expr: max by (instance) (node_hwmon_temp_celsius{chip=~".*coretemp.*"}) > 80
                for: 5m
                labels:
                  severity: warning
