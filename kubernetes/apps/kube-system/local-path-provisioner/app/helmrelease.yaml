---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-path-provisioner
spec:
  chart:
    spec:
      chart: local-path-provisioner
      version: 0.0.35
      sourceRef:
        kind: HelmRepository
        name: containeroo
  interval: 1h
  values:
    storageClass:
      name: local-path
      create: true
      defaultClass: true
      reclaimPolicy: Delete
    nodePathMap:
      - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
        paths:
          - /var/local-path-provisioner
