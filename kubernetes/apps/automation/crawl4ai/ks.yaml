---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crawl4ai
spec:
  interval: 1h
  path: ./kubernetes/apps/automation/crawl4ai/app
  postBuild:
    substitute:
      APP: crawl4ai
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: automation
  wait: false
