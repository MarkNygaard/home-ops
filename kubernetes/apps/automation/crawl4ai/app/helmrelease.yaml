---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crawl4ai
spec:
  chartRef:
    kind: OCIRepository
    name: crawl4ai
  interval: 1h
  values:
    controllers:
      crawl4ai:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          copy-browsers:
            image:
              repository: docker.io/unclecode/crawl4ai
              tag: 0.8.0
            command:
              - sh
              - -c
              - cp -a /root/.cache/ms-playwright/* /browsers/
        containers:
          app:
            image:
              repository: docker.io/unclecode/crawl4ai
              tag: 0.8.0
            envFrom:
              - secretRef:
                  name: crawl4ai-secret
            env:
              TZ: Europe/Copenhagen
              HOME: /home/crawl4ai
              PLAYWRIGHT_BROWSERS_PATH: /browsers
            ports:
              - name: http
                containerPort: 11235
                protocol: TCP
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 11235
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 11235
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: true
              capabilities:
                add: ["SETUID", "SETGID"]
                drop: ["ALL"]
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
    service:
      app:
        ports:
          http:
            port: 11235
    persistence:
      browsers:
        type: emptyDir
        globalMounts:
          - path: /browsers
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        globalMounts:
          - path: /dev/shm
      data:
        type: emptyDir
        globalMounts:
          - path: /home/crawl4ai
      tmp:
        type: emptyDir
