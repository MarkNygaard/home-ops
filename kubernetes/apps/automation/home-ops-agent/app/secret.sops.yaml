---
# IMPORTANT: This file needs to be encrypted with SOPS before committing.
# Run from WSL2: sops --encrypt --in-place kubernetes/apps/automation/home-ops-agent/app/secret.sops.yaml
apiVersion: v1
kind: Secret
metadata:
  name: home-ops-agent-secret
stringData:
  GITHUB_TOKEN: "YOUR_GITHUB_FINE_GRAINED_PAT"
  DATABASE_URL: "postgresql+asyncpg://home_ops_agent:YOUR_DB_PASSWORD@postgres-rw.database.svc.cluster.local:5432/home_ops_agent"
  SESSION_SECRET: "YOUR_RANDOM_SESSION_SECRET"
  # OAuth app credentials (from Anthropic developer portal registration)
  # Required if using OAuth auth method. Leave empty to use API key instead.
  ANTHROPIC_CLIENT_ID: ""
  ANTHROPIC_CLIENT_SECRET: ""
  # API key can be set here OR through the web UI settings panel
  # ANTHROPIC_API_KEY: ""
