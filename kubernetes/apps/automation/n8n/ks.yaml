---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: n8n
spec:
  dependsOn:
    - name: cloudnativepg-cluster
      namespace: database
    - name: redis
      namespace: database
  interval: 1h
  path: ./kubernetes/apps/automation/n8n/app
  postBuild:
    substitute:
      APP: n8n
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: automation
  wait: false
