---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
spec:
  chartRef:
    kind: OCIRepository
    name: redis
  interval: 1h
  values:
    controllers:
      redis:
        containers:
          app:
            image:
              repository: valkey/valkey
              tag: 8.1.1
            command:
              - valkey-server
            args:
              - --save
              - ""
              - --appendonly
              - "no"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
    service:
      app:
        ports:
          redis:
            port: 6379
    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /data
