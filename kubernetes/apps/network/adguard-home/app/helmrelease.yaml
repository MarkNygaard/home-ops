---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: adguard-home
spec:
  chartRef:
    kind: OCIRepository
    name: adguard-home
  interval: 1h
  values:
    controllers:
      adguard-home:
        containers:
          app:
            image:
              repository: adguard/adguardhome
              tag: v0.107.74
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                add: ["NET_BIND_SERVICE"]
                drop: ["ALL"]
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
    service:
      app:
        ports:
          http:
            port: 3000
      dns:
        controller: adguard-home
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "192.168.42.14"
        ports:
          dns-tcp:
            port: 53
            protocol: TCP
          dns-udp:
            port: 53
            protocol: UDP
    persistence:
      config:
        existingClaim: adguard-home
        globalMounts:
          - path: /opt/adguardhome/conf
            subPath: conf
          - path: /opt/adguardhome/work
            subPath: work
      tmp:
        type: emptyDir
    route:
      app:
        hostnames:
          - "adguard.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 3000
