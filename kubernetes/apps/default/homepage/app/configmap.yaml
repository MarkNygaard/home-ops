---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
data:
  custom.css: |
    @media (min-width: 1280px) {
      .services-group {
        flex-basis: 33.333% !important;
      }
    }
  docker.yaml: ""
  kubernetes.yaml: |
    mode: cluster
  bookmarks.yaml: |
    - Developer:
        - GitHub:
            - icon: github.svg
              href: https://github.com/MarkNygaard/home-ops
              description: home-ops repository
        - Flux Web UI:
            - icon: flux-cd.svg
              href: https://flux.mnygaard.io
              description: Flux GitOps dashboard
    - Cloud:
        - Cloudflare:
            - icon: cloudflare.svg
              href: https://dash.cloudflare.com
              description: DNS and tunnel management
        - Renovate:
            - icon: renovate.svg
              href: https://developer.mend.io/github/MarkNygaard/home-ops
              description: Dependency updates
  services.yaml: |
    - Media:
        - Jellyfin:
            icon: jellyfin.svg
            href: https://jellyfin.mnygaard.io
            description: Media server
        - Radarr:
            icon: radarr.svg
            href: https://radarr.mnygaard.io
            description: Movie management
            widget:
              type: radarr
              url: http://radarr.media.svc.cluster.local
              key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"
        - Sonarr:
            icon: sonarr.svg
            href: https://sonarr.mnygaard.io
            description: TV show management
            widget:
              type: sonarr
              url: http://sonarr.media.svc.cluster.local
              key: "{{HOMEPAGE_VAR_SONARR_API_KEY}}"
        - Prowlarr:
            icon: prowlarr.svg
            href: https://prowlarr.mnygaard.io
            description: Indexer management
            widget:
              type: prowlarr
              url: http://prowlarr.media.svc.cluster.local
              key: "{{HOMEPAGE_VAR_PROWLARR_API_KEY}}"
        - Bazarr:
            icon: bazarr.svg
            href: https://bazarr.mnygaard.io
            description: Subtitle management
            widget:
              type: bazarr
              url: http://bazarr.media.svc.cluster.local:6767
              key: "{{HOMEPAGE_VAR_BAZARR_API_KEY}}"
        - qBittorrent:
            icon: qbittorrent.svg
            href: https://qbittorrent.mnygaard.io
            description: Torrent client
            widget:
              type: qbittorrent
              url: http://qbittorrent.media.svc.cluster.local:8080
        - Seerr:
            icon: overseerr.svg
            href: https://seerr.mnygaard.io
            description: Media requests
    - Monitoring:
        - Grafana:
            icon: grafana.svg
            href: https://grafana.mnygaard.io
            description: Dashboards and metrics
        - Prometheus:
            icon: prometheus.svg
            href: https://prometheus.mnygaard.io
            description: Metrics collection
        - Alertmanager:
            icon: alertmanager.svg
            href: https://alertmanager.mnygaard.io
            description: Alert management
        - Gatus:
            icon: gatus.svg
            href: https://status.mnygaard.io
            description: Uptime monitoring
        - Ntfy:
            icon: ntfy.svg
            href: https://ntfy.mnygaard.io
            description: Push notifications
        - Home Assistant:
            icon: home-assistant.svg
            href: http://192.168.42.202:8123/dwains-dashboard/home
            description: Home automation
    - "—":
        - Calendar:
            widget:
              type: calendar
              maxEvents: 20
              showTime: true
              integrations:
                - type: radarr
                  service_group: Media
                  service_name: Radarr
                  params:
                    unmonitored: false
                - type: sonarr
                  service_group: Media
                  service_name: Sonarr
                  params:
                    unmonitored: false
    - Automation:
        - n8n:
            icon: n8n.svg
            href: https://n8n.mnygaard.io
            description: Workflow automation
        - Crawl4AI:
            icon: mdi-spider-web
            href: https://crawl4ai.mnygaard.io
            description: Web crawler playground
    - Productivity:
        - Excalidraw:
            icon: excalidraw.svg
            href: https://excalidraw.mnygaard.io
            description: Whiteboard
    - Infrastructure:
        - Authentik:
            icon: authentik.svg
            href: https://auth.mnygaard.io
            description: Identity and SSO
        - AdGuard Home:
            icon: adguard-home.svg
            href: https://adguard.mnygaard.io
            description: DNS management
        - UniFi:
            icon: unifi.svg
            href: https://unifi.ui.com/
            description: Network management
  settings.yaml: |
    title: Home Operations
    favicon: https://github.com/walkxcode/dashboard-icons/raw/main/svg/kubernetes.svg
    theme: dark
    color: slate
    headerStyle: clean
    statusStyle: dot
    layout:
      Media:
        style: column
      Monitoring:
        style: column
      "—":
        style: column
      Automation:
        style: column
      Productivity:
        style: column
      Infrastructure:
        style: column
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: home-ops
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: google
        target: _blank
