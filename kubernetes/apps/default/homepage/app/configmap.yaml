---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
data:
  docker.yaml: ""
  kubernetes.yaml: |
    mode: cluster
  bookmarks.yaml: |
    - Developer:
        - GitHub:
            - icon: github.svg
              href: https://github.com/MarkNygaard/home-ops
              description: home-ops repository
        - Flux Web UI:
            - icon: flux-cd.svg
              href: https://flux.mnygaard.io
              description: Flux GitOps dashboard
    - Cloud:
        - Cloudflare:
            - icon: cloudflare.svg
              href: https://dash.cloudflare.com
              description: DNS and tunnel management
        - Renovate:
            - icon: renovate.svg
              href: https://developer.mend.io/github/MarkNygaard/home-ops
              description: Dependency updates
  services.yaml: |
    - Media:
        - Jellyfin:
            icon: jellyfin.svg
            href: https://jellyfin.mnygaard.io
            description: Media server
        - Radarr:
            icon: radarr.svg
            href: https://radarr.mnygaard.io
            description: Movie management
            widget:
              type: radarr
              url: http://radarr.media.svc.cluster.local
              key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"
        - Sonarr:
            icon: sonarr.svg
            href: https://sonarr.mnygaard.io
            description: TV show management
            widget:
              type: sonarr
              url: http://sonarr.media.svc.cluster.local
              key: "{{HOMEPAGE_VAR_SONARR_API_KEY}}"
        - Prowlarr:
            icon: prowlarr.svg
            href: https://prowlarr.mnygaard.io
            description: Indexer management
            widget:
              type: prowlarr
              url: http://prowlarr.media.svc.cluster.local
              key: "{{HOMEPAGE_VAR_PROWLARR_API_KEY}}"
        - Bazarr:
            icon: bazarr.svg
            href: https://bazarr.mnygaard.io
            description: Subtitle management
            widget:
              type: bazarr
              url: http://bazarr.media.svc.cluster.local:6767
              key: "{{HOMEPAGE_VAR_BAZARR_API_KEY}}"
        - qBittorrent:
            icon: qbittorrent.svg
            href: https://qbittorrent.mnygaard.io
            description: Torrent client
            widget:
              type: qbittorrent
              url: http://qbittorrent.media.svc.cluster.local:8080
        - Seerr:
            icon: overseerr.svg
            href: https://seerr.mnygaard.io
            description: Media requests
    - Monitoring:
        - Grafana:
            icon: grafana.svg
            href: https://grafana.mnygaard.io
            description: Dashboards and metrics
        - Prometheus:
            icon: prometheus.svg
            href: https://prometheus.mnygaard.io
            description: Metrics collection
        - Gatus:
            icon: gatus.svg
            href: https://status.mnygaard.io
            description: Uptime monitoring
        - Ntfy:
            icon: ntfy.svg
            href: https://ntfy.mnygaard.io
            description: Push notifications
    - Infrastructure:
        - Envoy Gateway:
            icon: envoy.svg
            href: https://envoy.mnygaard.io
            description: Ingress gateway
        - Cert Manager:
            icon: cert-manager.svg
            href: ""
            description: TLS certificate management
  settings.yaml: |
    title: Home Operations
    favicon: https://github.com/walkxcode/dashboard-icons/raw/main/svg/kubernetes.svg
    theme: dark
    color: slate
    headerStyle: clean
    statusStyle: dot
    layout:
      Media:
        style: row
        columns: 4
      Monitoring:
        style: row
        columns: 4
      Infrastructure:
        style: row
        columns: 3
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: home-ops
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: google
        target: _blank
