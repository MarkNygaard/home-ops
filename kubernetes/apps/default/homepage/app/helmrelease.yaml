---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
spec:
  chartRef:
    kind: OCIRepository
    name: homepage
  interval: 1h
  values:
    controllers:
      homepage:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/gethomepage/homepage
              tag: v0.10.9
            envFrom:
              - secretRef:
                  name: homepage-secret
            env:
              TZ: Europe/Copenhagen
              HOMEPAGE_ALLOWED_HOSTS: "homepage.${SECRET_DOMAIN}"
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                spec:
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 256Mi
    defaultPodOptions:
      automountServiceAccountToken: true
      serviceAccountName: homepage
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: 3000
    persistence:
      config:
        type: configMap
        name: homepage-config
        globalMounts:
          - subPath: bookmarks.yaml
            path: /app/config/bookmarks.yaml
            readOnly: true
          - subPath: docker.yaml
            path: /app/config/docker.yaml
            readOnly: true
          - subPath: kubernetes.yaml
            path: /app/config/kubernetes.yaml
            readOnly: true
          - subPath: services.yaml
            path: /app/config/services.yaml
            readOnly: true
          - subPath: settings.yaml
            path: /app/config/settings.yaml
            readOnly: true
          - subPath: widgets.yaml
            path: /app/config/widgets.yaml
            readOnly: true
      tmp:
        type: emptyDir
    configMaps:
      config:
        data:
          docker.yaml: ""
          kubernetes.yaml: |
            mode: cluster
          bookmarks.yaml: |
            - Developer:
                - GitHub:
                    - icon: github.svg
                      href: https://github.com/MarkNygaard/home-ops
                      description: home-ops repository
                - Flux Web UI:
                    - icon: flux-cd.svg
                      href: https://flux.${SECRET_DOMAIN}
                      description: Flux GitOps dashboard
            - Cloud:
                - Cloudflare:
                    - icon: cloudflare.svg
                      href: https://dash.cloudflare.com
                      description: DNS and tunnel management
                - Renovate:
                    - icon: renovate.svg
                      href: https://developer.mend.io/github/MarkNygaard/home-ops
                      description: Dependency updates
          services.yaml: |
            - Media:
                - Jellyfin:
                    icon: jellyfin.svg
                    href: https://jellyfin.${SECRET_DOMAIN}
                    description: Media server
                    widget:
                      type: jellyfin
                      url: http://jellyfin.media.svc.cluster.local:8096
                      enableNowPlaying: true
                - Radarr:
                    icon: radarr.svg
                    href: https://radarr.${SECRET_DOMAIN}
                    description: Movie management
                    widget:
                      type: radarr
                      url: http://radarr.media.svc.cluster.local
                      key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"
                - Sonarr:
                    icon: sonarr.svg
                    href: https://sonarr.${SECRET_DOMAIN}
                    description: TV show management
                    widget:
                      type: sonarr
                      url: http://sonarr.media.svc.cluster.local
                      key: "{{HOMEPAGE_VAR_SONARR_API_KEY}}"
                - Prowlarr:
                    icon: prowlarr.svg
                    href: https://prowlarr.${SECRET_DOMAIN}
                    description: Indexer management
                    widget:
                      type: prowlarr
                      url: http://prowlarr.media.svc.cluster.local
                      key: "{{HOMEPAGE_VAR_PROWLARR_API_KEY}}"
                - Bazarr:
                    icon: bazarr.svg
                    href: https://bazarr.${SECRET_DOMAIN}
                    description: Subtitle management
                    widget:
                      type: bazarr
                      url: http://bazarr.media.svc.cluster.local:6767
                      key: "{{HOMEPAGE_VAR_BAZARR_API_KEY}}"
                - qBittorrent:
                    icon: qbittorrent.svg
                    href: https://qbittorrent.${SECRET_DOMAIN}
                    description: Torrent client
                    widget:
                      type: qbittorrent
                      url: http://qbittorrent.media.svc.cluster.local:8080
                - Seerr:
                    icon: overseerr.svg
                    href: https://seerr.${SECRET_DOMAIN}
                    description: Media requests
                    widget:
                      type: overseerr
                      url: http://seerr.media.svc.cluster.local:5055
            - Monitoring:
                - Grafana:
                    icon: grafana.svg
                    href: https://grafana.${SECRET_DOMAIN}
                    description: Dashboards and metrics
                    widget:
                      type: grafana
                      url: http://grafana.monitoring.svc.cluster.local:3000
                - Prometheus:
                    icon: prometheus.svg
                    href: https://prometheus.${SECRET_DOMAIN}
                    description: Metrics collection
                    widget:
                      type: prometheus
                      url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
                - Gatus:
                    icon: gatus.svg
                    href: https://gatus.${SECRET_DOMAIN}
                    description: Uptime monitoring
                - Ntfy:
                    icon: ntfy.svg
                    href: https://ntfy.${SECRET_DOMAIN}
                    description: Push notifications
            - Infrastructure:
                - Envoy Gateway:
                    icon: envoy.svg
                    href: https://envoy.${SECRET_DOMAIN}
                    description: Ingress gateway
                - Cert Manager:
                    icon: cert-manager.svg
                    href: ""
                    description: TLS certificate management
          settings.yaml: |
            title: Home Operations
            favicon: https://github.com/walkxcode/dashboard-icons/raw/main/svg/kubernetes.svg
            theme: dark
            color: slate
            headerStyle: clean
            statusStyle: dot
            layout:
              Media:
                style: row
                columns: 4
              Monitoring:
                style: row
                columns: 4
              Infrastructure:
                style: row
                columns: 3
          widgets.yaml: |
            - kubernetes:
                cluster:
                  show: true
                  cpu: true
                  memory: true
                  showLabel: true
                  label: home-ops
                nodes:
                  show: true
                  cpu: true
                  memory: true
                  showLabel: true
            - search:
                provider: google
                target: _blank
    route:
      app:
        annotations:
          gatus.home-operations.com/enabled: "true"
          gatus.home-operations.com/name: Homepage
        hostnames:
          - "homepage.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
